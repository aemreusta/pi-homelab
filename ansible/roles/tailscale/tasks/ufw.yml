---
- name: Allow Tailscale WireGuard through UFW
  community.general.ufw:
    rule: allow
    port: "41641"
    proto: udp
    comment: Tailscale WireGuard

- name: Allow traffic from Tailscale interface
  community.general.ufw:
    rule: allow
    interface: tailscale0
    direction: in
    comment: Tailscale tunnel interface
