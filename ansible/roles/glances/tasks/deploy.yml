---
- name: Create Glances compose directory
  ansible.builtin.file:
    path: "{{ glances_compose_dir }}"
    state: directory
    owner: "{{ docker_user }}"
    group: "{{ docker_user }}"
    mode: "0755"

- name: Copy Glances docker-compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ glances_compose_dir }}/docker-compose.yml"
    owner: "{{ docker_user }}"
    group: "{{ docker_user }}"
    mode: "0644"
  notify: Restart glances

- name: Start Glances container
  community.docker.docker_compose_v2:
    project_src: "{{ glances_compose_dir }}"
    state: present
  become: true
  become_user: "{{ docker_user }}"
