---
- name: Create Portainer compose directory
  ansible.builtin.file:
    path: "{{ portainer_compose_dir }}"
    state: directory
    owner: "{{ docker_user }}"
    group: "{{ docker_user }}"
    mode: "0755"

- name: Create Portainer data directory
  ansible.builtin.file:
    path: "{{ portainer_data_dir }}"
    state: directory
    owner: "{{ docker_user }}"
    group: "{{ docker_user }}"
    mode: "0755"

- name: Copy Portainer docker-compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ portainer_compose_dir }}/docker-compose.yml"
    owner: "{{ docker_user }}"
    group: "{{ docker_user }}"
    mode: "0644"
  notify: Restart portainer

- name: Start Portainer container
  community.docker.docker_compose_v2:
    project_src: "{{ portainer_compose_dir }}"
    state: present
  become: true
  become_user: "{{ docker_user }}"
