---
- name: Create Traefik directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ docker_user }}"
    group: "{{ docker_user }}"
    mode: "0755"
  loop:
    - "{{ traefik_compose_dir }}"
    - "{{ traefik_config_dir }}"
    - "{{ traefik_certs_dir }}"

- name: Template Traefik static config
  ansible.builtin.template:
    src: traefik.yml.j2
    dest: "{{ traefik_config_dir }}/traefik.yml"
    owner: "{{ docker_user }}"
    group: "{{ docker_user }}"
    mode: "0644"
  notify: Restart traefik

- name: Template Traefik dynamic config
  ansible.builtin.template:
    src: dynamic.yml.j2
    dest: "{{ traefik_config_dir }}/dynamic.yml"
    owner: "{{ docker_user }}"
    group: "{{ docker_user }}"
    mode: "0644"
  notify: Restart traefik

- name: Template Traefik docker-compose
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ traefik_compose_dir }}/docker-compose.yml"
    owner: "{{ docker_user }}"
    group: "{{ docker_user }}"
    mode: "0644"
  notify: Restart traefik

- name: Start Traefik
  community.docker.docker_compose_v2:
    project_src: "{{ traefik_compose_dir }}"
    state: present
