---
- name: Allow HTTP through UFW
  community.general.ufw:
    rule: allow
    port: "{{ traefik_http_port | string }}"
    proto: tcp
    comment: Traefik HTTP

- name: Allow HTTPS through UFW
  community.general.ufw:
    rule: allow
    port: "{{ traefik_https_port | string }}"
    proto: tcp
    comment: Traefik HTTPS

- name: Allow Traefik dashboard through UFW
  community.general.ufw:
    rule: allow
    port: "{{ traefik_dashboard_port | string }}"
    proto: tcp
    comment: Traefik Dashboard
