---
- name: Create Watchtower compose directory
  ansible.builtin.file:
    path: "{{ watchtower_compose_dir }}"
    state: directory
    owner: "{{ docker_user }}"
    group: "{{ docker_user }}"
    mode: "0755"

- name: Copy Watchtower docker-compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ watchtower_compose_dir }}/docker-compose.yml"
    owner: "{{ docker_user }}"
    group: "{{ docker_user }}"
    mode: "0644"
  notify: Restart watchtower

- name: Start Watchtower container
  community.docker.docker_compose_v2:
    project_src: "{{ watchtower_compose_dir }}"
    state: present
  become: true
  become_user: "{{ docker_user }}"
