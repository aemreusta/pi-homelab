---
- name: Create Maintainerr compose directory
  ansible.builtin.file:
    path: "{{ maintainerr_compose_dir }}"
    state: directory
    owner: "{{ docker_user }}"
    group: "{{ docker_user }}"
    mode: "0755"

- name: Create Maintainerr config directory
  ansible.builtin.file:
    path: "{{ maintainerr_config_dir }}"
    state: directory
    owner: "{{ docker_user }}"
    group: "{{ docker_user }}"
    mode: "0755"

- name: Copy Maintainerr docker-compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ maintainerr_compose_dir }}/docker-compose.yml"
    owner: "{{ docker_user }}"
    group: "{{ docker_user }}"
    mode: "0644"
  notify: Restart maintainerr

- name: Start Maintainerr container
  community.docker.docker_compose_v2:
    project_src: "{{ maintainerr_compose_dir }}"
    state: present
  become: true
  become_user: "{{ docker_user }}"
