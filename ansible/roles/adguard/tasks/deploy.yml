---
- name: Create AdGuard compose directory
  ansible.builtin.file:
    path: "{{ adguard_compose_dir }}"
    state: directory
    owner: "{{ docker_user }}"
    group: "{{ docker_user }}"
    mode: "0755"

- name: Create AdGuard data directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ docker_user }}"
    group: "{{ docker_user }}"
    mode: "0755"
  loop:
    - "{{ adguard_data_dir }}/work"
    - "{{ adguard_data_dir }}/conf"

- name: Copy AdGuard docker-compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ adguard_compose_dir }}/docker-compose.yml"
    owner: "{{ docker_user }}"
    group: "{{ docker_user }}"
    mode: "0644"
  notify: Restart adguard

- name: Start AdGuard container
  community.docker.docker_compose_v2:
    project_src: "{{ adguard_compose_dir }}"
    state: present
  become: true
  become_user: "{{ docker_user }}"
