---
- name: Create homelab control directory
  ansible.builtin.file:
    path: "{{ homelab_control_dir }}"
    state: directory
    owner: "{{ docker_user }}"
    group: "{{ docker_user }}"
    mode: "0755"

- name: Deploy control API script
  ansible.builtin.template:
    src: control-api.py.j2
    dest: "{{ homelab_control_dir }}/control-api.py"
    owner: "{{ docker_user }}"
    group: "{{ docker_user }}"
    mode: "0755"
  notify: Restart homelab-control

- name: Deploy shutdown script
  ansible.builtin.template:
    src: shutdown.sh.j2
    dest: "{{ homelab_control_dir }}/shutdown.sh"
    owner: root
    group: root
    mode: "0755"
  become: true

- name: Deploy restart script
  ansible.builtin.template:
    src: restart.sh.j2
    dest: "{{ homelab_control_dir }}/restart.sh"
    owner: root
    group: root
    mode: "0755"
  become: true

- name: Configure sudoers for control scripts
  ansible.builtin.template:
    src: sudoers-homelab-control.j2
    dest: /etc/sudoers.d/homelab-control
    owner: root
    group: root
    mode: "0440"
    validate: visudo -cf %s
  become: true

- name: Deploy systemd service
  ansible.builtin.template:
    src: homelab-control.service.j2
    dest: /etc/systemd/system/homelab-control.service
    owner: root
    group: root
    mode: "0644"
  become: true
  notify: Restart homelab-control

- name: Enable and start homelab-control service
  ansible.builtin.systemd:
    name: homelab-control
    enabled: true
    state: started
    daemon_reload: true
  become: true
